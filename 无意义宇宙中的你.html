<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无意义宇宙中的你</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #07091A;
    color: #E0E2F0;
    font-family: 'Noto Serif SC', 'Source Han Serif CN', 'STSong', 'SimSun', serif;
    overflow-x: hidden;
  }

  #stars-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.5s ease forwards; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-12px); }
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  @keyframes planetReveal {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.15; }
    50%      { opacity: 0.9; }
  }

  /* ─── INTRO ─── */
  .intro-orb-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
    animation: float 5s ease-in-out infinite;
  }
  .intro-orb {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 32%, #8899CC, #111A3A);
    box-shadow: 0 0 40px #2244AA88, 0 0 12px #3355AA66;
  }
  h1.title {
    font-size: 1.7rem;
    font-weight: 300;
    letter-spacing: .18em;
    text-align: center;
    color: #D8DCF0;
    margin-bottom: .4rem;
  }
  .subtitle {
    text-align: center;
    color: #4A5878;
    font-size: .82rem;
    letter-spacing: .14em;
    margin-bottom: 2.5rem;
  }
  .intro-box {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    padding: 1.4rem 1.6rem;
    margin-bottom: 2rem;
    line-height: 2.1;
    color: #7880A0;
    font-size: .9rem;
  }
  .intro-box p { margin-bottom: .5rem; }
  .intro-box p:last-child { margin-bottom: 0; }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 2.2rem;
  }
  .tag {
    padding: 5px 14px;
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 20px;
    font-size: .75rem;
    color: #404868;
  }
  .btn-start {
    display: block;
    margin: 0 auto;
    padding: .9rem 2.8rem;
    border: 1px solid rgba(255,255,255,.28);
    background: transparent;
    color: #D8DCF0;
    border-radius: 40px;
    cursor: pointer;
    font-family: inherit;
    font-size: .95rem;
    letter-spacing: .1em;
    transition: all .25s;
  }
  .btn-start:hover {
    background: rgba(255,255,255,.1);
    border-color: rgba(255,255,255,.5);
  }

  /* ─── QUIZ ─── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2.2rem;
  }
  .progress-bar-bg {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,.08);
    border-radius: 1px;
  }
  .progress-bar-fill {
    height: 100%;
    background: rgba(255,255,255,.38);
    border-radius: 1px;
    transition: width .45s ease;
  }
  .progress-label {
    color: #3A4870;
    font-size: .75rem;
    letter-spacing: .12em;
    white-space: nowrap;
  }
  .signal-label {
    color: #3A4870;
    font-size: .7rem;
    letter-spacing: .22em;
    margin-bottom: 1rem;
  }
  .question-text {
    font-size: 1.18rem;
    font-weight: 400;
    line-height: 1.8;
    margin-bottom: 2rem;
    color: #D8DCF0;
    letter-spacing: .04em;
  }
  .choice-btn {
    width: 100%;
    padding: 1.2rem 1.5rem;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.025);
    color: #B0B4CC;
    border-radius: 13px;
    cursor: pointer;
    text-align: left;
    font-size: .95rem;
    font-family: inherit;
    line-height: 1.65;
    transition: all .22s;
    margin-bottom: 12px;
    display: block;
  }
  .choice-btn:hover {
    background: rgba(255,255,255,.07);
    border-color: rgba(255,255,255,.26);
    color: #E0E2F0;
    transform: translateX(5px);
  }
  .choice-letter {
    display: block;
    color: #3A4870;
    font-size: .68rem;
    letter-spacing: .18em;
    margin-bottom: .35rem;
  }

  /* ─── RESULT ─── */
  .result-eyebrow {
    text-align: center;
    color: #303858;
    font-size: .7rem;
    letter-spacing: .22em;
    margin-bottom: 1.6rem;
  }
  .planet-orb-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.3rem;
  }
  .planet-orb {
    width: 96px; height: 96px;
    border-radius: 50%;
    animation: planetReveal .8s ease forwards, float 6s ease-in-out .8s infinite;
  }
  .planet-name {
    font-size: 1.9rem;
    font-weight: 300;
    letter-spacing: .14em;
    text-align: center;
    color: #D8DCF0;
    margin-bottom: .3rem;
  }
  .planet-subtitle {
    text-align: center;
    font-size: .88rem;
    letter-spacing: .16em;
    margin-bottom: 2rem;
  }
  .info-box {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 13px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.3rem;
  }
  .desc-text {
    color: #6070A0;
    font-size: .83rem;
    line-height: 1.9;
  }
  .traits-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.4rem;
  }
  .trait-tag {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: .76rem;
  }
  .profile-box {
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.065);
    border-radius: 13px;
    padding: 1.5rem 1.6rem;
    margin-bottom: 1.4rem;
  }
  .profile-text {
    color: #8890B0;
    font-size: .88rem;
    line-height: 2.1;
    white-space: pre-wrap;
  }
  .second-planet-box {
    display: flex;
    align-items: center;
    gap: 13px;
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.055);
    border-radius: 11px;
    padding: .9rem 1.2rem;
    margin-bottom: 1.4rem;
  }
  .second-orb {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .second-label {
    font-size: .68rem;
    color: #303858;
    letter-spacing: .14em;
    margin-bottom: 2px;
  }
  .second-name {
    font-size: .88rem;
    color: #8890B0;
  }
  .btn-mystery {
    width: 100%;
    padding: .85rem;
    border-radius: 11px;
    cursor: pointer;
    font-family: inherit;
    font-size: .86rem;
    letter-spacing: .1em;
    background: transparent;
    transition: all .22s;
    margin-bottom: 1rem;
  }
  .mystery-box {
    border-radius: 11px;
    padding: 1.6rem;
    margin-bottom: 1.4rem;
    animation: fadeIn .4s ease;
  }
  .mystery-text {
    white-space: pre-wrap;
    line-height: 2.2;
    font-size: .9rem;
    color: #7080A8;
    letter-spacing: .05em;
  }
  .btn-restart {
    display: block;
    margin: .5rem auto 0;
    background: transparent;
    border: none;
    color: #333858;
    cursor: pointer;
    font-family: inherit;
    font-size: .8rem;
    letter-spacing: .12em;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .btn-restart:hover { color: #6070A0; }

  @media (max-width: 480px) {
    #app { padding: 2rem 1.1rem; }
    h1.title { font-size: 1.35rem; }
    .question-text { font-size: 1rem; }
    .planet-name { font-size: 1.5rem; }
    .planet-orb { width: 76px; height: 76px; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="app">

  <!-- INTRO SCREEN -->
  <div id="screen-intro" class="screen active">
    <div class="intro-orb-wrap"><div class="intro-orb"></div></div>
    <h1 class="title">无意义宇宙中的你</h1>
    <p class="subtitle">NASA 发现了数千颗系外行星</p>
    <div class="intro-box">
      <p>接下来没有正确答案。</p>
      <p>每一道题，请选择更接近你真实运行方式的一边。</p>
      <p>不要选择你希望成为的自己。</p>
      <p>请选择你在深夜、疲惫、孤独、无人观看时，最接近的自己。</p>
    </div>
    <div class="tags">
      <span class="tag">有些过热，有些冰冷</span>
      <span class="tag">有些在宜居带边缘沉默运行</span>
      <span class="tag">有些拥有海洋，却藏在冰层之下</span>
      <span class="tag">有些被重新定义，却仍然完整</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">以宇宙尺度，看见自己</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="progress-row">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">01 / 24</span>
    </div>
    <p class="signal-label" id="signal-label">SIGNAL 01</p>
    <p class="question-text" id="question-text"></p>
    <button class="choice-btn" id="btn-a" onclick="answer('a')">
      <span class="choice-letter">A</span>
      <span id="text-a"></span>
    </button>
    <button class="choice-btn" id="btn-b" onclick="answer('b')">
      <span class="choice-letter">B</span>
      <span id="text-b"></span>
    </button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <p class="result-eyebrow">你的星球</p>
    <div class="planet-orb-wrap">
      <div class="planet-orb" id="result-orb"></div>
    </div>
    <p class="planet-name" id="result-name"></p>
    <p class="planet-subtitle" id="result-subtitle"></p>
    <div class="info-box">
      <p class="desc-text" id="result-desc"></p>
    </div>
    <div class="traits-row" id="result-traits"></div>
    <div class="profile-box">
      <p class="profile-text" id="result-profile"></p>
    </div>
    <div class="second-planet-box" id="second-planet-box">
      <div class="second-orb" id="second-orb"></div>
      <div>
        <p class="second-label">副星球</p>
        <p class="second-name" id="second-name"></p>
      </div>
    </div>
    <button class="btn-mystery" id="btn-mystery" onclick="toggleMystery()">展开奥秘</button>
    <div class="mystery-box" id="mystery-box" style="display:none">
      <p class="mystery-text" id="result-mystery"></p>
    </div>
    <button class="btn-restart" onclick="restart()">重新开始</button>
  </div>

</div>

<script>
// ─── STAR CANVAS ───────────────────────────────────────────
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 140; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.008 + 0.002,
      dir: Math.random() > 0.5 ? 1 : -1,
    });
  }
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.alpha += s.speed * s.dir;
    if (s.alpha >= 1 || s.alpha <= 0) s.dir *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha.toFixed(2)})`;
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
resizeCanvas();
initStars();
animateStars();

// ─── DATA ──────────────────────────────────────────────────
const PLANETS = {
  "TOI-700 d": {
    subtitle: "安静宜居者",
    color: "#7C9885",
    glow: "#7C988580",
    bg: "rgba(124,152,133,0.12)",
    desc: "NASA TESS 任务发现的一颗系外行星，位于宜居带内，安静运行在微妙的位置上。它不耀眼，却保存着一份尚未被证实的温柔。",
    traits: ["轨道稳定", "低温持续", "不急证明"],
    profile: `如果你的星球是 TOI-700 d，你不是那种一进入人群就让所有人注意到的人。你的生命力不以强烈的方式出现，而是以低温、稳定、缓慢的方式存在。

你需要安全环境。太强烈的人、太密集的关系、太急迫的期待，都会让你本能地收缩。你不是拒绝世界，你只是知道自己需要恰当的距离。

你身上有一种安静的可居住性。和你相处久了的人，会慢慢发现你并不冷漠，也不空洞。你的内部有秩序，有温度，有微弱但持续的光。你不是烟花式的人，你更像气候。

你最大的优势是稳定、持久和低调的承载力。你不擅长夸张表达，但你能长期陪伴；你不会迅速燃烧，也不轻易熄灭。

你的危险在于，你可能太依赖"合适条件"。其实你不是没有生命力，你只是对生存条件敏感。

你的课题不是变得耀眼，而是找到一颗不会灼伤你的太阳。`,
    mystery: `你不是冰。
你只是曾经需要冰。

人们站在你的表面，
说这里寒冷，安静，没有生命。
他们说得并非全错。
他们只是没有抵达足够深的地方。

不要急着证明你的海。
海不因无人看见而消失。

但也不要永远躲在冰下。
生命若只在深处存在，
它会安全，
也会孤独。`,
  },
  "Europa": {
    subtitle: "冰壳深海人格",
    color: "#5B8FB9",
    glow: "#5B8FB980",
    bg: "rgba(91,143,185,0.12)",
    desc: "木星的冰卫星，表面寒冷明亮，冰层之下可能存在全球性海洋。真正的价值，永远隐藏在表层之下。",
    traits: ["外冷内深", "情感忠诚", "需要耐心"],
    profile: `如果你的星球是 Europa，你是一个外冷内深的人。

你不轻易展示自己的情绪。你习惯让自己看起来理性、安静、克制，甚至有些难以靠近。很多人可能会误以为你不需要亲密，或者你的内心并不复杂。但他们看到的只是冰壳。

你的内部有很深的海。那里储存着记忆、渴望、失望、忠诚和无法轻易说出的爱。你不是没有情感，而是你的情感太深，以至于不能随便交给一个不懂深度的人。

你的防御不是伪装，而是历史。你曾经可能太早学会了保护自己。

在关系中，你需要的是耐心，不是入侵。你不喜欢被强行打开，你希望有人相信冰下有海，而不是拿锤子证明你不够柔软。

你的危险在于，你可能逐渐把冰壳误认为自己。其实不是，那只是你曾经活下来的方式。`,
    mystery: `你不是冰。
你只是曾经需要冰。

人们站在你的表面，
说这里寒冷，安静，没有生命。
他们说得并非全错。
他们只是没有抵达足够深的地方。

不要急着证明你的海。
海不因无人看见而消失。

但也不要永远躲在冰下。
生命若只在深处存在，
它会安全，
也会孤独。`,
  },
  "Enceladus": {
    subtitle: "裂缝喷泉人格",
    color: "#A07CB5",
    glow: "#A07CB580",
    bg: "rgba(160,124,181,0.12)",
    desc: "土星冰卫星，从南极裂缝喷出水汽直入太空。最重要的信息，不是来自完整的表面，而是来自裂缝。",
    traits: ["裂缝生命力", "从破碎重生", "内部仍流动"],
    profile: `如果你的星球是 Enceladus，你不是一个没有裂缝的人。恰恰相反，你的生命力常常从裂缝中出现。

你可能经历过某些破裂：关系的断裂、信念的坍塌、自我认知的重建，或者某种无法轻易讲述的低谷。但这些并没有只留下损坏。它们也让你内部深处的东西有了出口。

你不是那种靠完美维持尊严的人。你的真实、创造力、共情力和精神韧性，往往来自你曾经破碎过。有时，一个人真正可贵的部分，正是从破损处喷发出来的。

你对痛苦有一种特殊的理解。你知道痛苦不是一种简单的失败，它可能是深处仍然有海的证据。

你的危险在于，你可能过度依赖危机来证明自己还活着。你的课题是：不只在裂缝中喷发，也在完整时允许自己存在。`,
    mystery: `裂缝不是失败。
有时，那是深处仍有海的证据。

你曾经以为自己破了。
后来才知道，
正是那里让宇宙听见了你。

不要崇拜痛苦。
痛苦本身并不高贵。

但如果它已经发生，
你仍然可以让它成为出口，
而不是终点。`,
  },
  "Pluto": {
    subtitle: "边缘完整者",
    color: "#8B7BB5",
    glow: "#8B7BB580",
    bg: "rgba(139,123,181,0.12)",
    desc: "曾被称为第九大行星，后被重新分类。被重新定义，却并没有因此停止运行。边缘位置不等于失败。",
    traits: ["边缘尊严", "拒绝被定义", "内在复杂"],
    profile: `如果你的星球是 Pluto，你很可能经历过某种"被重新定义"的时刻。

你可能曾经属于某个系统，后来被移出中心。你可能被误解、被降级、被重新命名，或者发现别人对你的期待并不能容纳真实的你。

你和归属感的关系很复杂。你渴望被承认，但又不愿意为了被承认而扭曲自己。你可以在边缘生活，但你不希望边缘被理解成失败。你只是拒绝为了进入中心而丢掉自己的轨道。

你的内在比别人想象得复杂。遥远只是让他们看不清，并不意味着你简单。

你的优势是尊严、独立、清醒和自我保存能力。即使世界改变了对你的称呼，你仍然知道自己在运行。

你的课题是：不要把别人的名单当成宇宙本身。`,
    mystery: `有一天，世界改变了你的名字。
你没有因此停止运行。

这就是你的尊严。

人类喜欢分类，
因为他们害怕复杂。
他们把你移出名单，
仿佛名单就是宇宙。

但宇宙并不读名单。

你在遥远的地方继续存在。
寒冷，缓慢，完整。
不再需要中心的承认，
也不把边缘误认为失败。`,
  },
  "55 Cancri e": {
    subtitle: "高压钻石人格",
    color: "#C4923A",
    glow: "#C4923A80",
    bg: "rgba(196,146,58,0.12)",
    desc: "超级地球，高温高压，曾被称为钻石行星。有些光泽不是轻松长出来的，而是在极端压力下形成的。",

// ─── STATE ─────────────────────────────────────────────────
let current = 0;
let scores = {};
let mysteryOpen = false;

function initScores() {
  scores = {};
  Object.keys(PLANETS).forEach(k => scores[k] = 0);
}

// ─── SCREENS ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function startQuiz() {
  initScores();
  current = 0;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const pct = Math.round((current / QUESTIONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    String(current + 1).padStart(2,'0') + ' / ' + QUESTIONS.length;
  document.getElementById('signal-label').textContent =
    'SIGNAL ' + String(current + 1).padStart(2,'0');
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('text-a').textContent = q.a.text;
  document.getElementById('text-b').textContent = q.b.text;
}

function answer(choice) {
  const q = QUESTIONS[current];
  const chosen = choice === 'a' ? q.a : q.b;
  Object.entries(chosen.scores).forEach(([planet, pts]) => {
    scores[planet] = (scores[planet] || 0) + pts;
  });

  if (current + 1 >= QUESTIONS.length) {
    showResult();
  } else {
    const quiz = document.getElementById('screen-quiz');
    quiz.style.animation = 'fadeOut 0.28s ease forwards';
    setTimeout(() => {
      current++;
      renderQuestion();
      quiz.style.animation = 'fadeIn 0.4s ease forwards';
    }, 280);
  }
}

function showResult() {
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  const mainKey = sorted[0][0];
  const secondKey = sorted[1][0];
  const p = PLANETS[mainKey];
  const p2 = PLANETS[secondKey];

  // orb
  const orb = document.getElementById('result-orb');
  orb.style.background = `radial-gradient(circle at 35% 32%, ${p.color}DD, ${p.color}55)`;
  orb.style.boxShadow = `0 0 32px ${p.glow}, 0 0 10px ${p.color}44`;

  document.getElementById('result-name').textContent = mainKey;
  document.getElementById('result-subtitle').textContent = p.subtitle;
  document.getElementById('result-subtitle').style.color = p.color;
  document.getElementById('result-desc').textContent = p.desc;

  // traits
  const traitsEl = document.getElementById('result-traits');
  traitsEl.innerHTML = p.traits.map(t =>
    `<span class="trait-tag" style="border:1px solid ${p.color}55;color:${p.color};background:${p.bg}">${t}</span>`
  ).join('');

  document.getElementById('result-profile').textContent = p.profile;

  // second planet
  const s2orb = document.getElementById('second-orb');
  s2orb.style.background = `radial-gradient(circle at 35% 32%, ${p2.color}DD, ${p2.color}55)`;
  s2orb.style.boxShadow = `0 0 12px ${p2.glow}`;
  document.getElementById('second-name').textContent = secondKey + ' · ' + p2.subtitle;

  // mystery button
  const btnM = document.getElementById('btn-mystery');
  btnM.style.border = `1px solid ${p.color}44`;
  btnM.style.color = p.color;
  mysteryOpen = false;
  btnM.textContent = '展开奥秘';
  document.getElementById('mystery-box').style.display = 'none';
  document.getElementById('result-mystery').textContent = p.mystery;

  const mbox = document.getElementById('mystery-box');
  mbox.style.border = `1px solid ${p.color}33`;

  showScreen('result');
}

function toggleMystery() {
  mysteryOpen = !mysteryOpen;
  const box = document.getElementById('mystery-box');
  const btn = document.getElementById('btn-mystery');
  box.style.display = mysteryOpen ? 'block' : 'none';
  btn.textContent = mysteryOpen ? '收起奥秘' : '展开奥秘';
}

function restart() {
  initScores();
  showScreen('intro');
}
</script>
